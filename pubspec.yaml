name: lapo_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  bloc: ^9.2.0
  cached_network_image: ^3.3.1
  carousel_slider: ^5.1.2
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dots_indicator: ^4.0.1
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_launcher_icons: ^0.14.4
  flutter_svg: ^2.2.4
  font_awesome_flutter: ^11.0.0
  get_it: ^9.2.1
  google_fonts: ^8.0.2
  google_sign_in: ^6.2.1
  intl: ^0.20.2
  modal_progress_hud_nsn: ^0.5.1
  shared_preferences: ^2.5.5
  supabase_flutter: ^2.12.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/splash/
    - assets/images/onboarding/
  #   - images/a_dot_ham.jpeg
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
flutter_assets:
  assets_path: assets/images/
  output_path: lib/core/utils
  filename: app_images.dart

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_app.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0E14"
  adaptive_icon_foreground: "assets/images/logo_app.png"
